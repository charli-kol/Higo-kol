<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higo KOL 管理系统 · 最终修复版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .view-container { width: 100%; height: 100%; display: none; flex-direction: row; }
        .view-container.active { display: flex; }
        .sidebar { width: 220px; background: #0F172A; color: #94A3B8; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar .logo { height: 64px; display: flex; align-items: center; padding: 0 20px; color: #fff; font-weight: 700; font-size: 18px; border-bottom: 1px solid #1E293B; }
        .nav-item { padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .nav-item.active { background: #4F46E5; color: #fff; }
        .nav-item:hover:not(.active) { color: #fff; background: #1E293B; }
        .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .topbar { height: 64px; background: #fff; border-bottom: 1px solid #E2E8F0; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; flex-shrink: 0; }
        .main-content { padding: 24px; overflow-y: auto; flex: 1; }
        .th-style { padding: 12px 16px; font-size: 13px; font-weight: 600; color: #64748B; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; }
        .td-style { padding: 16px; font-size: 14px; color: #334155; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }
        .drawer-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; display: none; justify-content: flex-end; opacity: 0; transition: opacity 0.3s ease; }
        .drawer-overlay.show { display: flex; opacity: 1; }
        .drawer { width: 50vw; min-width: 720px; background: #fff; height: 100%; box-shadow: -10px 0 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .drawer-overlay.show .drawer { transform: translateX(0); }
        .form-label { display: block; font-size: 13px; color: #475569; font-weight: 500; margin-bottom: 6px; }
        .form-input { width: 100%; border: 1px solid #CBD5E1; border-radius: 6px; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s; background: #fff; }
        .form-input:focus { border-color: #4F46E5; box-shadow: 0 0 0 2px rgba(79,70,229,0.1); }
        .section-title { font-size: 15px; font-weight: 700; color: #1E293B; margin: 28px 0 16px 0; display: flex; align-items: center; gap: 8px; }
        .section-title::before { content: ''; display: block; width: 4px; height: 14px; background: #4F46E5; border-radius: 2px; }
        .delete-btn { cursor: pointer; color: #EF4444; }
        .delete-btn:hover { color: #B91C1C; }
        .edit-btn { cursor: pointer; color: #4F46E5; margin-right: 8px; }
        .edit-btn:hover { color: #3730A3; }
        .empty-row td { padding: 30px; text-align: center; color: #94A3B8; font-style: italic; }
        .badge { @apply text-xs px-2.5 py-1 rounded-full border font-medium; }
        .status-active { background: #DBEAFE; color: #1E40AF; border-color: #BFDBFE; }
        .status-pending { background: #FEF3C7; color: #B45309; border-color: #FDE68A; }
        video { max-width: 100%; max-height: 120px; border-radius: 4px; }
        .file-preview-link { color: #4F46E5; text-decoration: underline; cursor: pointer; }
        .file-preview-link:hover { color: #3730A3; }
        .asset-video { max-width: 260px; max-height: 160px; border-radius: 6px; border: 1px solid #E2E8F0; }
        .asset-translate { max-width: 260px; word-break: break-word; display: inline-block; }
    </style>
</head>
<body>

<!-- HTML结构保持不变，只修改JavaScript部分 -->
<!-- 所有视图结构同上，此处省略以节省篇幅，完整HTML见下文 -->

<script>
    // ========== 全局数据存储 ==========
    const STORAGE_KEYS = {
        kol: 'higo_kol_data',
        quote: 'higo_quote_data',
        contract: 'higo_contract_data',
        content: 'higo_content_data',
        payment: 'higo_payment_data'
    };

    // 读取数据
    function loadData() {
        try {
            window.kolData = JSON.parse(localStorage.getItem(STORAGE_KEYS.kol) || '[]');
            window.quoteData = JSON.parse(localStorage.getItem(STORAGE_KEYS.quote) || '[]');
            window.contractData = JSON.parse(localStorage.getItem(STORAGE_KEYS.contract) || '[]');
            window.contentData = JSON.parse(localStorage.getItem(STORAGE_KEYS.content) || '[]');
            window.paymentData = JSON.parse(localStorage.getItem(STORAGE_KEYS.payment) || '[]');
        } catch(e) {
            console.error('数据加载失败:', e);
            window.kolData = [];
            window.quoteData = [];
            window.contractData = [];
            window.contentData = [];
            window.paymentData = [];
        }
    }

    // 保存数据（不触发渲染）
    function saveData() {
        try {
            localStorage.setItem(STORAGE_KEYS.kol, JSON.stringify(window.kolData || []));
            localStorage.setItem(STORAGE_KEYS.quote, JSON.stringify(window.quoteData || []));
            localStorage.setItem(STORAGE_KEYS.contract, JSON.stringify(window.contractData || []));
            localStorage.setItem(STORAGE_KEYS.content, JSON.stringify(window.contentData || []));
            localStorage.setItem(STORAGE_KEYS.payment, JSON.stringify(window.paymentData || []));
            return true;
        } catch(e) {
            console.error('数据保存失败:', e);
            alert('数据保存失败，请检查浏览器存储空间！');
            return false;
        }
    }

    // 保存并刷新所有视图
    function saveAndRefresh() {
        if (saveData()) {
            refreshCurrentView();
        }
    }

    // 刷新当前激活的视图
    function refreshCurrentView() {
        const activeView = document.querySelector('.view-container.active');
        if (!activeView) return;
        
        const viewId = activeView.id;
        switch(viewId) {
            case 'view-kol': renderKolTable(); break;
            case 'view-quote': renderQuoteTable(); break;
            case 'view-contract': renderContractTable(); break;
            case 'view-content': renderContentTable(); break;
            case 'view-payment': renderPaymentTable(); break;
            case 'view-promotion': renderPromotionView(); break;
            case 'view-assets': renderAssetView(); break;
        }
    }

    // ========== ID生成 ==========
    function generateId(prefix) {
        const now = new Date();
        const dateStr = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
        let arr;
        if (prefix === 'Q') arr = window.quoteData;
        else if (prefix === 'CTR') arr = window.contractData;
        else if (prefix === 'S') arr = window.contentData;
        else if (prefix === 'Payment') arr = window.paymentData;
        else return prefix + '_' + dateStr + '_001';
        
        const dayIds = arr.filter(item => item.id && item.id.startsWith(prefix + '_' + dateStr));
        return prefix + '_' + dateStr + '_' + String(dayIds.length + 1).padStart(3,'0');
    }

    function generatePaymentId(contractId) {
        const payments = (window.paymentData || []).filter(p => p.contractId === contractId);
        return 'Payment_' + contractId + '_' + String(payments.length + 1).padStart(2,'0');
    }

    // ========== 文件处理工具 ==========
    function handleFileUpload(input, previewId, nameId) {
        const file = input.files[0];
        if (!file) return null;
        
        // 更新文件名显示
        if (nameId) {
            const nameEl = document.getElementById(nameId);
            if (nameEl) nameEl.textContent = file.name;
        }
        
        // 读取文件为DataURL
        const reader = new FileReader();
        reader.onload = function(e) {
            const dataUrl = e.target.result;
            const previewEl = document.getElementById(previewId);
            if (previewEl) {
                // 根据文件类型显示预览
                if (file.type.startsWith('image/')) {
                    previewEl.innerHTML = `<a href="${dataUrl}" target="_blank"><img src="${dataUrl}" style="max-width:200px;max-height:150px;border-radius:4px;border:1px solid #e2e8f0;"></a>`;
                } else if (file.type === 'application/pdf') {
                    previewEl.innerHTML = `<a href="${dataUrl}" target="_blank" class="file-preview-link">📄 查看PDF文件</a>`;
                } else if (file.type.startsWith('video/')) {
                    previewEl.innerHTML = `<video controls src="${dataUrl}" style="max-height:120px;border-radius:4px;"></video>`;
                } else {
                    previewEl.innerHTML = `<a href="${dataUrl}" target="_blank" class="file-preview-link">📎 查看文件</a>`;
                }
                // 存储DataURL到dataset
                previewEl.dataset.fileData = dataUrl;
            }
        };
        reader.readAsDataURL(file);
        return true;
    }

    // ========== KOL管理 ==========
    function renderKolTable() {
        const tbody = document.getElementById('kolTableBody');
        if (!tbody) return;
        
        const search = (document.getElementById('kolSearch')?.value || '').toLowerCase();
        const filter = document.getElementById('kolFilter')?.value || 'all';
        
        let list = (window.kolData || []).filter(k => {
            const matchSearch = (k.name || '').toLowerCase().includes(search) || 
                              (k.email || '').toLowerCase().includes(search);
            const matchFilter = filter === 'all' || k.type === filter;
            return matchSearch && matchFilter;
        });
        
        if (list.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="8">暂无数据，点击"录入KOL"添加</td></tr>';
            return;
        }
        
        tbody.innerHTML = list.map(k => `
            <tr class="hover:bg-gray-50">
                <td class="td-style font-medium">${k.name || ''}</td>
                <td class="td-style">${k.platform || ''}</td>
                <td class="td-style">${k.followers || ''}</td>
                <td class="td-style">${k.country || ''}</td>
                <td class="td-style"><span class="text-xs bg-gray-100 px-2 py-1 rounded">${k.tags || ''}</span></td>
                <td class="td-style">${k.url ? `<a href="${k.url}" target="_blank" class="text-indigo-600 hover:underline">🔗 主页</a>` : '-'}</td>
                <td class="td-style"><span class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded">${k.type || ''}</span></td>
                <td class="td-style text-right">
                    <span class="edit-btn" onclick="editKol(${k.id})"><i class="fa-solid fa-pen"></i></span>
                    <span class="delete-btn" onclick="deleteKol(${k.id})"><i class="fa-solid fa-trash"></i></span>
                </td>
            </tr>
        `).join('');
    }

    function saveKol() {
        const id = document.getElementById('kolEditId')?.value;
        const name = document.getElementById('kolName')?.value?.trim();
        const platform = document.getElementById('kolPlatform')?.value;
        const followers = document.getElementById('kolFollowers')?.value?.trim();
        const country = document.getElementById('kolCountry')?.value;
        const tags = document.getElementById('kolTags')?.value?.trim();
        const type = document.getElementById('kolType')?.value;
        
        if (!name || !platform || !followers || !country || !tags || !type) {
            alert('请填写所有必填项');
            return;
        }
        
        const kolObj = {
            id: id ? parseInt(id) : Date.now(),
            name,
            platform,
            url: document.getElementById('kolUrl')?.value?.trim() || '',
            followers,
            country,
            lang: document.getElementById('kolLang')?.value?.trim() || '',
            gender: document.getElementById('kolGender')?.value || '女',
            type,
            phone: document.getElementById('kolPhone')?.value?.trim() || '',
            email: document.getElementById('kolEmail')?.value?.trim() || '',
            tags,
            style: document.getElementById('kolStyle')?.value?.trim() || '',
            note: document.getElementById('kolNote')?.value?.trim() || ''
        };
        
        if (id) {
            const idx = (window.kolData || []).findIndex(k => k.id === parseInt(id));
            if (idx > -1) window.kolData[idx] = kolObj;
        } else {
            if (!window.kolData) window.kolData = [];
            window.kolData.push(kolObj);
        }
        
        // 保存数据
        saveData();
        // 关闭抽屉
        forceCloseDrawer('drawer-kol');
        // 刷新表格
        renderKolTable();
        // 清空表单
        clearKolForm();
    }

    function clearKolForm() {
        document.getElementById('kolEditId').value = '';
        document.getElementById('kolDrawerTitle').textContent = '录入 KOL 资源';
        document.getElementById('kolName').value = '';
        document.getElementById('kolUrl').value = '';
        document.getElementById('kolFollowers').value = '';
        document.getElementById('kolTags').value = '';
        document.getElementById('kolEmail').value = '';
        document.getElementById('kolPhone').value = '';
        document.getElementById('kolStyle').value = '';
        document.getElementById('kolNote').value = '';
        document.getElementById('kolLang').value = '';
    }

    function editKol(id) {
        const k = (window.kolData || []).find(i => i.id === id);
        if (!k) return;
        
        document.getElementById('kolEditId').value = id;
        document.getElementById('kolDrawerTitle').textContent = '编辑 KOL';
        document.getElementById('kolName').value = k.name || '';
        document.getElementById('kolPlatform').value = k.platform || 'TikTok';
        document.getElementById('kolUrl').value = k.url || '';
        document.getElementById('kolFollowers').value = k.followers || '';
        document.getElementById('kolCountry').value = k.country || '土耳其 (TR)';
        document.getElementById('kolLang').value = k.lang || '';
        document.getElementById('kolGender').value = k.gender || '女';
        document.getElementById('kolType').value = k.type || '个人';
        document.getElementById('kolPhone').value = k.phone || '';
        document.getElementById('kolEmail').value = k.email || '';
        document.getElementById('kolTags').value = k.tags || '';
        document.getElementById('kolStyle').value = k.style || '';
        document.getElementById('kolNote').value = k.note || '';
        
        openDrawer('drawer-kol');
    }

    function deleteKol(id) {
        if (!confirm('确认删除该KOL？相关数据也会被删除！')) return;
        
        const quoteIds = (window.quoteData || []).filter(q => q.kolId === id).map(q => q.id);
        window.quoteData = (window.quoteData || []).filter(q => q.kolId !== id);
        window.contractData = (window.contractData || []).filter(c => !quoteIds.includes(c.quoteId));
        window.contentData = (window.contentData || []).filter(c => !quoteIds.includes(c.contractId));
        window.paymentData = (window.paymentData || []).filter(p => !quoteIds.includes(p.contractId));
        window.kolData = (window.kolData || []).filter(k => k.id !== id);
        
        saveData();
        renderKolTable();
    }

    // ========== 报价管理 ==========
    function renderQuoteTable() {
        const tbody = document.getElementById('quoteTableBody');
        if (!tbody) return;
        
        if (!window.quoteData || window.quoteData.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="7">暂无报价</td></tr>';
            return;
        }
        
        tbody.innerHTML = window.quoteData.map(q => {
            const kol = (window.kolData || []).find(k => k.id === q.kolId);
            return `<tr class="hover:bg-gray-50">
                <td class="td-style font-mono text-xs">${q.id}</td>
                <td class="td-style">${q.kol || ''}</td>
                <td class="td-style">${q.platform || ''}</td>
                <td class="td-style">${q.format || ''} x${q.qty || 1}</td>
                <td class="td-style font-bold">$ ${q.amount || 0}</td>
                <td class="td-style">${kol?.url ? `<a href="${kol.url}" target="_blank" class="text-indigo-600">🔗</a>` : '-'}</td>
                <td class="td-style text-right">
                    <span class="edit-btn" onclick="editQuote('${q.id}')"><i class="fa-solid fa-pen"></i></span>
                    <span class="delete-btn" onclick="deleteQuote('${q.id}')"><i class="fa-solid fa-trash"></i></span>
                </td>
            </tr>`;
        }).join('');
    }

    function saveQuote() {
        const id = document.getElementById('quoteEditId')?.value;
        const kolId = document.getElementById('quoteKolId')?.value;
        const platform = document.getElementById('quotePlatformSelect')?.value;
        const format = document.getElementById('quoteFormat')?.value;
        const qty = document.getElementById('quoteQty')?.value?.trim();
        const amount = document.getElementById('quoteAmount')?.value?.trim();
        
        if (!kolId || !platform || !format || !qty || !amount) {
            alert('请填写所有必填项');
            return;
        }
        
        const kol = (window.kolData || []).find(k => k.id === parseInt(kolId));
        if (!kol) {
            alert('请选择有效的KOL');
            return;
        }
        
        const quoteObj = {
            id: id || generateId('Q'),
            kolId: parseInt(kolId),
            kol: kol.name,
            platform,
            format,
            qty: parseInt(qty) || 1,
            amount: parseFloat(amount) || 0,
            note: document.getElementById('quoteNote')?.value?.trim() || ''
        };
        
        if (id) {
            const idx = (window.quoteData || []).findIndex(q => q.id === id);
            if (idx > -1) window.quoteData[idx] = quoteObj;
        } else {
            if (!window.quoteData) window.quoteData = [];
            window.quoteData.push(quoteObj);
        }
        
        saveData();
        forceCloseDrawer('drawer-quote');
        renderQuoteTable();
        clearQuoteForm();
    }

    function clearQuoteForm() {
        document.getElementById('quoteEditId').value = '';
        document.getElementById('quoteDrawerTitle').textContent = '新建报价单';
        document.getElementById('quoteKolSearch').value = '';
        document.getElementById('quoteKolId').value = '';
        document.getElementById('quoteKolSuggest').innerHTML = '';
        document.getElementById('quotePlatformSelect').innerHTML = '<option value="">-- 请先选择KOL --</option>';
        document.getElementById('quoteAmount').value = '';
        document.getElementById('quoteQty').value = '1';
        document.getElementById('quoteNote').value = '';
    }

    function deleteQuote(id) {
        if (!confirm('⚠️ 删除报价单将同时删除关联的合同、服务内容和付款单！')) return;
        
        const contractIds = (window.contractData || []).filter(c => c.quoteId === id).map(c => c.id);
        window.contractData = (window.contractData || []).filter(c => c.quoteId !== id);
        window.contentData = (window.contentData || []).filter(c => !contractIds.includes(c.contractId));
        window.paymentData = (window.paymentData || []).filter(p => !contractIds.includes(p.contractId));
        window.quoteData = (window.quoteData || []).filter(q => q.id !== id);
        
        saveData();
        renderQuoteTable();
    }

    // ========== 合同管理 ==========
    function renderContractTable() {
        const tbody = document.getElementById('contractTableBody');
        if (!tbody) return;
        
        if (!window.contractData || window.contractData.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="9">暂无合同</td></tr>';
            return;
        }
        
        tbody.innerHTML = window.contractData.map(c => `
            <tr class="hover:bg-gray-50">
                <td class="td-style font-bold">${c.id}</td>
                <td class="td-style font-mono text-xs">${c.quoteId || ''}</td>
                <td class="td-style">${c.kol || ''}</td>
                <td class="td-style">${c.platform || '-'}</td>
                <td class="td-style">${c.format || '-'}</td>
                <td class="td-style">${c.payMethod || ''}</td>
                <td class="td-style font-bold">$ ${c.amount || 0}</td>
                <td class="td-style">${c.fileData ? `<a href="${c.fileData}" target="_blank" class="file-preview-link">📄 查看PDF</a>` : '-'}</td>
                <td class="td-style text-right">
                    <span class="edit-btn" onclick="editContract('${c.id}')"><i class="fa-solid fa-pen"></i></span>
                    <span class="delete-btn" onclick="deleteContract('${c.id}')"><i class="fa-solid fa-trash"></i></span>
                </td>
            </tr>
        `).join('');
    }

    function saveContract() {
        const id = document.getElementById('contractEditId')?.value;
        const quoteId = document.getElementById('contractQuoteId')?.value;
        
        if (!quoteId) {
            alert('请输入有效的报价单ID');
            return;
        }
        
        const q = (window.quoteData || []).find(q => q.id === quoteId);
        if (!q) {
            alert('报价单不存在');
            return;
        }
        
        const payMethod = document.querySelector('input[name="pay"]:checked')?.value || '一次性';
        const filePreview = document.getElementById('contractFilePreview');
        const fileData = filePreview?.dataset?.fileData || '';
        
        const contractObj = {
            id: id || generateId('CTR'),
            quoteId,
            kol: q.kol,
            platform: q.platform,
            format: q.format,
            payMethod,
            amount: q.amount,
            start: document.getElementById('contractStart')?.value || '',
            end: document.getElementById('contractEnd')?.value || '',
            fileData
        };
        
        if (id) {
            const idx = (window.contractData || []).findIndex(c => c.id === id);
            if (idx > -1) window.contractData[idx] = contractObj;
        } else {
            if (!window.contractData) window.contractData = [];
            window.contractData.push(contractObj);
            // 自动生成服务内容
            autoGenerateContent(contractObj);
        }
        
        saveData();
        forceCloseDrawer('drawer-contract');
        renderContractTable();
        clearContractForm();
    }

    function autoGenerateContent(contract) {
        if (!window.contentData) window.contentData = [];
        const exists = window.contentData.some(c => c.contractId === contract.id);
        if (exists) return;
        
        window.contentData.push({
            id: generateId('S'),
            contractId: contract.id,
            kol: contract.kol,
            platform: contract.platform || '',
            format: contract.format || '',
            spk: '',
            expiry: '',
            url: '',
            zh: '',
            videoData: ''
        });
    }

    // ========== 服务内容管理 ==========
    function renderContentTable() {
        const tbody = document.getElementById('contentTableBody');
        if (!tbody) return;
        
        const search = (document.getElementById('contentSearch')?.value || '').toLowerCase();
        let list = (window.contentData || []).filter(c => {
            return (c.contractId || '').toLowerCase().includes(search) || 
                   (c.kol || '').toLowerCase().includes(search);
        });
        
        if (list.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="10">暂无服务内容</td></tr>';
            return;
        }
        
        tbody.innerHTML = list.map(c => `
            <tr class="hover:bg-gray-50">
                <td class="td-style font-mono text-xs">${c.id}</td>
                <td class="td-style text-xs">${c.contractId || '-'}</td>
                <td class="td-style font-medium">${c.kol || '-'}</td>
                <td class="td-style">${c.platform || '-'}</td>
                <td class="td-style">${c.format || '-'}</td>
                <td class="td-style">${c.spk || '-'}</td>
                <td class="td-style text-xs">${c.expiry || '-'}</td>
                <td class="td-style">${c.url ? `<a href="${c.url}" target="_blank" class="text-indigo-600">🔗</a>` : '-'}</td>
                <td class="td-style">${c.videoData ? `<video controls src="${c.videoData}" class="max-h-12 rounded"></video>` : '-'}</td>
                <td class="td-style text-right">
                    <span class="edit-btn" onclick="editContent('${c.id}')"><i class="fa-solid fa-pen"></i></span>
                    <span class="delete-btn" onclick="deleteContent('${c.id}')"><i class="fa-solid fa-trash"></i></span>
                </td>
            </tr>
        `).join('');
    }

    function saveContent() {
        const id = document.getElementById('contentEditId')?.value;
        if (!id) {
            alert('缺少内容ID');
            return;
        }
        
        const idx = (window.contentData || []).findIndex(c => c.id === id);
        if (idx === -1) {
            alert('未找到该内容记录');
            return;
        }
        
        const videoPreview = document.getElementById('contentVideoPreview');
        window.contentData[idx].spk = document.getElementById('contentSpk')?.value?.trim() || '';
        window.contentData[idx].expiry = document.getElementById('contentExpiry')?.value || '';
        window.contentData[idx].url = document.getElementById('contentUrl')?.value?.trim() || '';
        window.contentData[idx].zh = document.getElementById('contentZh')?.value?.trim() || '';
        
        if (videoPreview?.dataset?.fileData) {
            window.contentData[idx].videoData = videoPreview.dataset.fileData;
        }
        
        saveData();
        forceCloseDrawer('drawer-content');
        renderContentTable();
        clearContentForm();
    }

    function clearContentForm() {
        document.getElementById('contentEditId').value = '';
        document.getElementById('contentDrawerTitle').textContent = '编辑服务内容';
        document.getElementById('contentSpk').value = '';
        document.getElementById('contentExpiry').value = '';
        document.getElementById('contentUrl').value = '';
        document.getElementById('contentZh').value = '';
        const videoPreview = document.getElementById('contentVideoPreview');
        if (videoPreview) {
            videoPreview.innerHTML = '';
            videoPreview.dataset.fileData = '';
        }
    }

    function editContent(id) {
        const c = (window.contentData || []).find(i => i.id === id);
        if (!c) return;
        
        document.getElementById('contentEditId').value = id;
        document.getElementById('contentPreviewKol').textContent = c.kol || '-';
        document.getElementById('contentPreviewPlatform').textContent = c.platform || '-';
        document.getElementById('contentPreviewFormat').textContent = c.format || '-';
        document.getElementById('contentSpk').value = c.spk || '';
        document.getElementById('contentExpiry').value = c.expiry || '';
        document.getElementById('contentUrl').value = c.url || '';
        document.getElementById('contentZh').value = c.zh || '';
        
        const videoPreview = document.getElementById('contentVideoPreview');
        if (c.videoData) {
            videoPreview.innerHTML = `<video controls src="${c.videoData}" class="max-h-32 rounded border"></video>`;
            videoPreview.dataset.fileData = c.videoData;
        } else {
            videoPreview.innerHTML = '';
            videoPreview.dataset.fileData = '';
        }
        
        openDrawer('drawer-content');
    }

    function deleteContent(id) {
        if (confirm('确认删除该服务内容？')) {
            window.contentData = (window.contentData || []).filter(c => c.id !== id);
            saveData();
            renderContentTable();
        }
    }

    // ========== 付款管理 ==========
    function renderPaymentTable() {
        const tbody = document.getElementById('paymentTableBody');
        if (!tbody) return;
        
        if (!window.paymentData || window.paymentData.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="8">暂无付款</td></tr>';
            return;
        }
        
        tbody.innerHTML = window.paymentData.map(p => `
            <tr class="hover:bg-gray-50">
                <td class="td-style font-mono text-xs">${p.id}</td>
                <td class="td-style text-xs">${p.contractId || '-'}</td>
                <td class="td-style font-medium">${p.kol || ''}</td>
                <td class="td-style font-bold text-indigo-600">$ ${p.amount || 0}</td>
                <td class="td-style"><span class="badge ${p.status === '已打款' ? 'status-active' : 'status-pending'}">${p.status || '待打款'}</span></td>
                <td class="td-style">${p.invoiceData ? `<a href="${p.invoiceData}" target="_blank" class="file-preview-link">📄 查看</a>` : '-'}</td>
                <td class="td-style">${p.voucherData ? `<a href="${p.voucherData}" target="_blank" class="file-preview-link">📄 查看</a>` : '-'}</td>
                <td class="td-style text-right">
                    <span class="edit-btn" onclick="editPayment('${p.id}')"><i class="fa-solid fa-pen"></i></span>
                    <span class="delete-btn" onclick="deletePayment('${p.id}')"><i class="fa-solid fa-trash"></i></span>
                </td>
            </tr>
        `).join('');
    }

    function savePayment() {
        const id = document.getElementById('paymentEditId')?.value;
        const contractId = document.getElementById('paymentContractId')?.value;
        
        if (!contractId) {
            alert('请输入有效的合同ID');
            return;
        }
        
        const contract = (window.contractData || []).find(c => c.id === contractId);
        if (!contract) {
            alert('合同不存在');
            return;
        }
        
        const amount = document.getElementById('paymentAmount')?.value?.trim();
        if (!amount) {
            alert('请填写金额');
            return;
        }
        
        if (parseFloat(amount) > parseFloat(contract.amount || 0)) {
            alert('付款金额不能超过总金额');
            return;
        }
        
        const invoicePreview = document.getElementById('invoicePreview');
        const voucherPreview = document.getElementById('voucherPreview');
        
        const paymentObj = {
            id: id || generatePaymentId(contractId),
            contractId,
            kol: contract.kol,
            amount: parseFloat(amount),
            channel: document.getElementById('paymentChannel')?.value || '银行电汇',
            beneficiary: document.getElementById('paymentBeneficiary')?.value?.trim() || '',
            iban: document.getElementById('paymentIban')?.value?.trim() || '',
            bank: document.getElementById('paymentBank')?.value?.trim() || '',
            swift: document.getElementById('paymentSwift')?.value?.trim() || '',
            bankAddr: document.getElementById('paymentBankAddr')?.value?.trim() || '',
            beneficiaryAddr: document.getElementById('paymentBeneficiaryAddr')?.value?.trim() || '',
            status: document.getElementById('paymentStatus')?.value || '待打款',
            note: document.getElementById('paymentNote')?.value?.trim() || '',
            invoiceData: invoicePreview?.dataset?.fileData || '',
            voucherData: voucherPreview?.dataset?.fileData || ''
        };
        
        if (id) {
            const idx = (window.paymentData || []).findIndex(p => p.id === id);
            if (idx > -1) window.paymentData[idx] = paymentObj;
        } else {
            if (!window.paymentData) window.paymentData = [];
            window.paymentData.push(paymentObj);
        }
        
        saveData();
        forceCloseDrawer('drawer-payment');
        renderPaymentTable();
        clearPaymentForm();
    }

    function clearPaymentForm() {
        document.getElementById('paymentEditId').value = '';
        document.getElementById('paymentContractSearch').value = '';
        document.getElementById('paymentContractId').value = '';
        document.getElementById('paymentAmount').value = '';
        document.getElementById('invoicePreview').innerHTML = '';
        document.getElementById('voucherPreview').innerHTML = '';
        document.getElementById('invoiceName').textContent = '未选择';
        document.getElementById('voucherName').textContent = '未选择';
    }

    // ========== 推广明细 ==========
    function renderPromotionView() {
        const list = (window.contentData || []).filter(c => c.url && c.url.trim());
        const tbody = document.getElementById('promotionTableBody');
        if (!tbody) return;
        
        let total = 0;
        if (list.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="6">暂无已发布内容</td></tr>';
        } else {
            tbody.innerHTML = list.map(c => {
                const contract = (window.contractData || []).find(ct => ct.id === c.contractId);
                const price = contract?.amount || 0;
                total += parseFloat(price) || 0;
                return `<tr class="hover:bg-gray-50">
                    <td class="td-style font-mono text-xs">${c.id}</td>
                    <td class="td-style">${c.kol || '-'}</td>
                    <td class="td-style">${c.platform || '-'}</td>
                    <td class="td-style">${c.format || '-'}</td>
                    <td class="td-style font-bold text-red-600">$ ${price}</td>
                    <td class="td-style"><a href="${c.url}" target="_blank" class="text-indigo-600">🔗</a></td>
                </tr>`;
            }).join('');
        }
        
        document.getElementById('totalConsumed').textContent = '$ ' + total.toFixed(2);
        document.getElementById('totalContents').textContent = list.length;
    }

    // ========== 素材库 ==========
    function renderAssetView() {
        const list = (window.contentData || []).filter(c => c.videoData && c.videoData.trim());
        const tbody = document.getElementById('assetTableBody');
        if (!tbody) return;
        
        if (list.length === 0) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="7">暂无视频素材</td></tr>';
            return;
        }
        
        tbody.innerHTML = list.map(c => {
            const contract = (window.contractData || []).find(ct => ct.id === c.contractId);
            return `<tr class="hover:bg-gray-50">
                <td class="td-style text-center">${c.videoData ? `<video controls src="${c.videoData}" class="asset-video"></video>` : '-'}</td>
                <td class="td-style font-bold">${c.kol || '-'}</td>
                <td class="td-style">${c.platform || '-'}</td>
                <td class="td-style">${c.format || '-'}</td>
                <td class="td-style text-xs">${c.spk || '-'}</td>
                <td class="td-style"><span class="asset-translate">${c.zh || '-'}</span></td>
                <td class="td-style">${c.url ? `<a href="${c.url}" target="_blank" class="text-indigo-600">🔗</a>` : '-'}</td>
            </tr>`;
        }).join('');
    }

    // ========== 全局函数暴露 ==========
    window.renderKol = renderKolTable;
    window.renderQuote = renderQuoteTable;
    window.renderContract = renderContractTable;
    window.renderContent = renderContentTable;
    window.renderPayment = renderPaymentTable;
    window.renderPromotion = renderPromotionView;
    window.renderAsset = renderAssetView;
    
    window.saveKol = saveKol;
    window.saveQuote = saveQuote;
    window.saveContract = saveContract;
    window.saveContent = saveContent;
    window.savePayment = savePayment;
    
    window.editKol = editKol;
    window.deleteKol = deleteKol;
    window.deleteQuote = deleteQuote;
    window.deleteContract = function(id) {
        if (confirm('确认删除该合同？')) {
            window.contentData = (window.contentData || []).filter(c => c.contractId !== id);
            window.paymentData = (window.paymentData || []).filter(p => p.contractId !== id);
            window.contractData = (window.contractData || []).filter(c => c.id !== id);
            saveData();
            renderContractTable();
        }
    };
    window.editContent = editContent;
    window.deleteContent = deleteContent;
    window.editPayment = function(id) { /* 保持原有逻辑 */ };
    window.deletePayment = function(id) {
        if (confirm('确认删除？')) {
            window.paymentData = (window.paymentData || []).filter(p => p.id !== id);
            saveData();
            renderPaymentTable();
        }
    };

    window.previewVideo = function(input) {
        handleFileUpload(input, 'contentVideoPreview');
    };
    
    window.previewContractFile = function(input) {
        handleFileUpload(input, 'contractFilePreview', 'contractFileName');
    };
    
    window.previewPaymentFile = function(input, previewId, nameId) {
        handleFileUpload(input, previewId, nameId);
    };

    // ========== UI控制 ==========
    window.switchView = function(viewId) {
        document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
        const target = document.getElementById(viewId);
        if (target) {
            target.classList.add('active');
            // 刷新对应视图
            setTimeout(() => {
                switch(viewId) {
                    case 'view-kol': renderKolTable(); break;
                    case 'view-quote': renderQuoteTable(); break;
                    case 'view-contract': renderContractTable(); break;
                    case 'view-content': renderContentTable(); break;
                    case 'view-payment': renderPaymentTable(); break;
                    case 'view-promotion': renderPromotionView(); break;
                    case 'view-assets': renderAssetView(); break;
                }
            }, 50);
        }
    };

    window.openDrawer = function(id) {
        const drawer = document.getElementById(id);
        if (drawer) drawer.classList.add('show');
    };

    window.closeDrawer = function(e, id) {
        if (e.target.id === id) {
            const drawer = document.getElementById(id);
            if (drawer) drawer.classList.remove('show');
        }
    };

    window.forceCloseDrawer = function(id) {
        const drawer = document.getElementById(id);
        if (drawer) drawer.classList.remove('show');
    };

    // ========== 搜索函数 ==========
    window.searchKolForQuote = function() {
        const input = document.getElementById('quoteKolSearch')?.value?.trim() || '';
        const suggest = document.getElementById('quoteKolSuggest');
        if (!input) {
            suggest.innerHTML = '';
            return;
        }
        const found = (window.kolData || []).filter(k => (k.name || '').toLowerCase().includes(input.toLowerCase()));
        if (found.length === 0) {
            suggest.innerHTML = '<span class="text-red-500">未找到</span>';
        } else {
            suggest.innerHTML = found.map(k => 
                `<span class="cursor-pointer text-indigo-600 hover:underline mr-3" onclick="window.selectKolForQuote(${k.id}, '${k.name}', '${k.platform}')">${k.name}</span>`
            ).join('');
        }
    };

    window.selectKolForQuote = function(id, name, platform) {
        document.getElementById('quoteKolSearch').value = name;
        document.getElementById('quoteKolId').value = id;
        document.getElementById('quoteKolSuggest').innerHTML = `<span class="text-green-600">已选择: ${name}</span>`;
        document.getElementById('quotePlatformSelect').innerHTML = `<option value="${platform}">${platform}</option>`;
    };

    window.searchQuoteForContract = function() {
        const input = document.getElementById('contractQuoteSearch')?.value?.trim() || '';
        const suggest = document.getElementById('contractQuoteSuggest');
        if (!input) { suggest.innerHTML = ''; return; }
        const found = (window.quoteData || []).filter(q => q.id.toLowerCase().includes(input.toLowerCase()));
        if (found.length === 0) {
            suggest.innerHTML = '<span class="text-red-500">未找到</span>';
        } else {
            suggest.innerHTML = found.map(q => 
                `<span class="cursor-pointer text-indigo-600 hover:underline mr-3" onclick="window.selectQuoteForContract('${q.id}')">${q.id} - ${q.kol}</span>`
            ).join('');
        }
    };

    window.selectQuoteForContract = function(id) {
        const q = (window.quoteData || []).find(q => q.id === id);
        if (!q) return;
        document.getElementById('contractQuoteSearch').value = id;
        document.getElementById('contractQuoteId').value = id;
        document.getElementById('contractQuoteSuggest').innerHTML = `<span class="text-green-600">已关联: ${id}</span>`;
        document.getElementById('contractPreviewKol').textContent = q.kol || '';
        document.getElementById('contractPreviewAmount').textContent = '$ ' + (q.amount || 0);
    };

    window.searchContractForPayment = function() {
        const input = document.getElementById('paymentContractSearch')?.value?.trim() || '';
        const suggest = document.getElementById('paymentContractSuggest');
        if (!input) { suggest.innerHTML = ''; return; }
        const found = (window.contractData || []).filter(c => c.id.toLowerCase().includes(input.toLowerCase()));
        if (found.length === 0) {
            suggest.innerHTML = '<span class="text-red-500">未找到</span>';
        } else {
            suggest.innerHTML = found.map(c => 
                `<span class="cursor-pointer text-indigo-600 hover:underline mr-3" onclick="window.selectContractForPayment('${c.id}')">${c.id} - ${c.kol}</span>`
            ).join('');
        }
    };

    window.selectContractForPayment = function(id) {
        const c = (window.contractData || []).find(c => c.id === id);
        if (!c) return;
        document.getElementById('paymentContractSearch').value = id;
        document.getElementById('paymentContractId').value = id;
        document.getElementById('paymentContractSuggest').innerHTML = `<span class="text-green-600">已关联: ${id}</span>`;
        document.getElementById('paymentPreviewKol').textContent = c.kol || '';
        document.getElementById('paymentPreviewAmount').textContent = '$ ' + (c.amount || 0);
    };

    window.validatePaymentAmount = function() {
        const max = parseFloat(document.getElementById('paymentAmount')?.max) || 0;
        const val = parseFloat(document.getElementById('paymentAmount')?.value) || 0;
        if (val > max) {
            alert('付款金额不能超过总金额 $' + max);
            document.getElementById('paymentAmount').value = max;
        }
    };

    // ========== 初始化 ==========
    function init() {
        loadData();
        renderKolTable();
        // 设置默认视图
        document.getElementById('view-kol').classList.add('active');
    }

    // 启动应用
    init();
</script>
</body>
</html>
